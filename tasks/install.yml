---
- name: Ensure Prometheus SSH exporter paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
    owner: "{{ prometheus_ssh_exporter_uid }}"
    group: "{{ prometheus_ssh_exporter_gid }}"
  with_items:
    - "{{ prometheus_ssh_exporter_base_path }}"
    - "{{ prometheus_ssh_exporter_config_path }}"

- name: Ensure Prometheus SSH exporter support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ prometheus_ssh_exporter_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ prometheus_ssh_exporter_uid }}"
    group: "{{ prometheus_ssh_exporter_gid }}"
  with_items:
    - env
    - labels
  register: prometheus_ssh_exporter_support_files_result

- name: Ensure Prometheus SSH exporter configuration file installed
  ansible.builtin.copy:
    content: "{{ prometheus_ssh_exporter_configuration | to_nice_yaml(indent=2, width=999999) }}"
    dest: "{{ prometheus_ssh_exporter_config_path }}/config.yaml"
    mode: "0640"
    owner: "{{ prometheus_ssh_exporter_uid }}"
    group: "{{ prometheus_ssh_exporter_gid }}"
  register: prometheus_ssh_exporter_config_file_result

- name: Ensure Prometheus SSH exporter container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ prometheus_ssh_exporter_container_image }}"
    pull: always
  register: prometheus_ssh_exporter_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: prometheus_ssh_exporter_container_image_pull_result_ansible_module is not failed

- name: Ensure Prometheus SSH exporter container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ prometheus_ssh_exporter_container_image }}"
  register: prometheus_ssh_exporter_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: prometheus_ssh_exporter_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in prometheus_ssh_exporter_container_image_pull_result_command.stdout"

- name: Run if 'host' network is not specified to be used
  when: prometheus_ssh_exporter_container_network != 'host'
  block:
    - name: Ensure Prometheus SSH exporter container network is created via community.docker.docker_network
      when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
      community.docker.docker_network:
        enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
        name: "{{ prometheus_ssh_exporter_container_network }}"
        driver: bridge
        driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
      register: prometheus_ssh_exporter_network_creation_result

    - name: Ensure Prometheus SSH exporter container network is created via ansible.builtin.command
      when: devture_systemd_docker_base_container_network_creation_method == 'command'
      ansible.builtin.command:
        cmd: >-
          {{ devture_systemd_docker_base_host_command_docker }} network create
          {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
          {{ devture_systemd_docker_base_container_networks_driver_options_string }}
          {{ prometheus_ssh_exporter_container_network }}
      register: prometheus_ssh_exporter_network_creation_result
      changed_when: prometheus_ssh_exporter_network_creation_result.rc == 0
      failed_when: prometheus_ssh_exporter_network_creation_result.rc != 0 and 'already exists' not in prometheus_ssh_exporter_network_creation_result.stderr

- name: Ensure Prometheus SSH exporter systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/prometheus-ssh-exporter.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ prometheus_ssh_exporter_identifier }}.service"
    mode: "0644"
  register: prometheus_ssh_exporter_systemd_service_result

- name: Determine whether Prometheus SSH exporter needs a restart
  ansible.builtin.set_fact:
    prometheus_ssh_exporter_restart_necessary: >-
      {{
        prometheus_ssh_exporter_support_files_result.changed | default(false)
        or prometheus_ssh_exporter_config_file_result.changed | default(false)
        or prometheus_ssh_exporter_systemd_service_result.changed | default(false)
        or prometheus_ssh_exporter_container_image_pull_result_ansible_module.changed | default(false)
        or prometheus_ssh_exporter_container_image_pull_result_command.changed | default(false)
      }}
